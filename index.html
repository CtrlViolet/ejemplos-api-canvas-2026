<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas API Showcase</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="assets/image/icono.png" type="image/x-icon">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">🎨 Canvas Showcase</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Ejemplos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container-fluid main-content">
        <h2 class="text-center text-light fw-bold mb-3">Ejemplos de Canvas API</h2>

        <div class="row g-3">
            <!-- SOLO 6 CARDS visibles sin scroll (grid compacto) -->

            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body">
                        <h6 class="card-title">Rectángulo</h6>
                        <canvas id="canvas1" width="180" height="120"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body">
                        <h6 class="card-title">Rectángulos combinados</h6>
                        <canvas id="canvas2" width="180" height="120"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body">
                        <h6 class="card-title">Sombra</h6>
                        <canvas id="canvas3" width="180" height="120"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body">
                        <h6 class="card-title">Triángulo</h6>
                        <canvas id="canvas4" width="180" height="120"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body">
                        <h6 class="card-title">Cara feliz</h6>
                        <canvas id="canvas5" width="180" height="120"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body">
                        <h6 class="card-title">Bezier</h6>
                        <canvas id="canvas6" width="180" height="120"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer bg-dark text-light text-center">
        <div class="container">
            <small>
                Desarrollado por Miguel Ángel Vital Luna | Ingeniería en Sistemas Computacionales | 2026
            </small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
